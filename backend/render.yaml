databases:
  - name: farmlink-db
    plan: free
    databaseName: farmlink
    user: farmlink

services:
  - type: web
    name: farmlink-api
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: farmlink-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: FRONTEND_URL
        value: https://agritech-farmlink.vercel.app
